spring.application.name=TTN_E-Commerce

# =========================
# Database Configuration
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# =========================
# Mail Configuration
# =========================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================
# JWT Configuration
# =========================
jwt.access-secret=${JWT_ACCESS_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}

# =========================
# Default Admin
# =========================
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.firstName=${ADMIN_FIRST_NAME}
app.admin.middleName=${ADMIN_MIDDLE_NAME}
app.admin.lastName=${ADMIN_LAST_NAME}

# =========================
# File Upload
# =========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

file.upload-dir=uploads

# =========================
# Messages
# =========================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.use-code-as-default-message=true

# =========================
# CORS
# =========================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# =========================
# Backend URL
# =========================
app.backend.base-url=${BACKEND_BASE_URL}